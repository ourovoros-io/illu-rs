<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b2"/>
      <feFlood flood-color="#00fff2" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="b1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonMagenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/>
      <feFlood flood-color="#ff00ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="b1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="textNeon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feFlood flood-color="#00fff2" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="b1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cyanMagenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00fff2"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>

  <!-- Deep dark background -->
  <rect width="800" height="200" rx="12" fill="#050510"/>

  <!-- Faint grid -->
  <g stroke="#00fff2" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Border glow -->
  <rect width="800" height="200" rx="12" fill="none" stroke="url(#cyanMagenta)" stroke-width="1" opacity="0.35"/>

  <!-- Central bloom behind icon -->
  <circle cx="105" cy="90" r="40" fill="#00fff2" opacity="0.06" filter="url(#bloom)"/>
  <circle cx="105" cy="90" r="25" fill="#d946ef" opacity="0.05" filter="url(#bloom)"/>

  <!-- Diamond frame around icon -->
  <polygon points="105,35 155,90 105,145 55,90"
           fill="none" stroke="#00fff2" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.6"/>

  <!-- Circuit traces from diamond -->
  <g fill="none" stroke="#00fff2" stroke-width="0.8" opacity="0.25" stroke-linecap="round">
    <polyline points="55,90 30,90 30,60"/>
    <polyline points="55,90 35,110 15,110"/>
    <polyline points="155,90 180,90 180,65"/>
    <polyline points="155,90 175,110 195,110"/>
    <line x1="105" y1="35" x2="105" y2="15"/>
    <line x1="105" y1="145" x2="105" y2="165"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#00fff2" opacity="0.4">
    <circle cx="30" cy="60" r="2"/>
    <circle cx="15" cy="110" r="2"/>
    <circle cx="180" cy="65" r="2"/>
    <circle cx="195" cy="110" r="2"/>
    <circle cx="105" cy="15" r="2"/>
    <circle cx="105" cy="165" r="2"/>
  </g>

  <!-- Code brackets < / > -->
  <g transform="translate(105, 90)" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-20,-18 -32,0 -20,18" stroke="#00fff2" filter="url(#neonCyan)"/>
    <polyline points="20,-18 32,0 20,18" stroke="#d946ef" filter="url(#neonMagenta)"/>
    <line x1="-7" y1="20" x2="7" y2="-20" stroke="#ffffff" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- "illu" text -->
  <text x="260" y="105" font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace"
        font-weight="800" font-size="72" letter-spacing="4"
        fill="#00fff2" filter="url(#textNeon)">illu</text>

  <!-- Tagline -->
  <text x="262" y="136" font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-weight="300" font-size="17" letter-spacing="1"
        fill="#a78bfa">Code intelligence for AI agents</text>

  <!-- Tech badges -->
  <g transform="translate(262, 152)">
    <rect x="0" y="0" width="52" height="20" rx="3" fill="none" stroke="#00fff2" stroke-width="0.7" opacity="0.4"/>
    <text x="26" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#00fff2" opacity="0.7">Rust</text>

    <rect x="60" y="0" width="46" height="20" rx="3" fill="none" stroke="#d946ef" stroke-width="0.7" opacity="0.4"/>
    <text x="83" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#d946ef" opacity="0.7">MCP</text>

    <rect x="114" y="0" width="56" height="20" rx="3" fill="none" stroke="#7c3aed" stroke-width="0.7" opacity="0.4"/>
    <text x="142" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.7">SQLite</text>
  </g>
</svg>
