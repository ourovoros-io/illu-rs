<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 310" width="400" height="310">
  <defs>
    <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b2"/>
      <feFlood flood-color="#00fff2" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="b1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonMagenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/>
      <feFlood flood-color="#ff00ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="b1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <filter id="textNeon" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feFlood flood-color="#00fff2" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="b1" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cyanMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00fff2"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="310" rx="12" fill="#050510"/>

  <!-- Faint grid -->
  <g stroke="#00fff2" stroke-width="0.3" opacity="0.07">
    <line x1="0" y1="62" x2="400" y2="62"/>
    <line x1="0" y1="124" x2="400" y2="124"/>
    <line x1="0" y1="186" x2="400" y2="186"/>
    <line x1="0" y1="248" x2="400" y2="248"/>
    <line x1="80" y1="0" x2="80" y2="310"/>
    <line x1="160" y1="0" x2="160" y2="310"/>
    <line x1="240" y1="0" x2="240" y2="310"/>
    <line x1="320" y1="0" x2="320" y2="310"/>
  </g>

  <!-- Border -->
  <rect width="400" height="310" rx="12" fill="none" stroke="url(#cyanMagenta)" stroke-width="1" opacity="0.3"/>

  <!-- ====================================== -->
  <!--  Icon centered at (200, 100)           -->
  <!--  Top pad 26px, bottom pad 26px         -->
  <!-- ====================================== -->

  <!-- Bloom -->
  <circle cx="200" cy="100" r="45" fill="#00fff2" opacity="0.06" filter="url(#bloom)"/>
  <circle cx="200" cy="100" r="28" fill="#d946ef" opacity="0.05" filter="url(#bloom)"/>

  <!-- Diamond: center 100, half-size 56 → y=44..156 -->
  <polygon points="200,44 256,100 200,156 144,100"
           fill="none" stroke="#00fff2" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.6"/>

  <!-- Circuit traces: extend 18px beyond diamond -->
  <g fill="none" stroke="#00fff2" stroke-width="0.8" opacity="0.25" stroke-linecap="round">
    <polyline points="144,100 118,100 118,73"/>
    <polyline points="144,100 124,120 100,120"/>
    <polyline points="256,100 282,100 282,73"/>
    <polyline points="256,100 276,120 300,120"/>
    <line x1="200" y1="44" x2="200" y2="26"/>
    <line x1="200" y1="156" x2="200" y2="174"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#00fff2" opacity="0.4">
    <circle cx="118" cy="73" r="2"/>
    <circle cx="100" cy="120" r="2"/>
    <circle cx="282" cy="73" r="2"/>
    <circle cx="300" cy="120" r="2"/>
    <circle cx="200" cy="26" r="2"/>
    <circle cx="200" cy="174" r="2"/>
  </g>

  <!-- Code brackets < / > -->
  <g transform="translate(200, 100)" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-22,-20 -35,0 -22,20" stroke="#00fff2" filter="url(#neonCyan)"/>
    <polyline points="22,-20 35,0 22,20" stroke="#d946ef" filter="url(#neonMagenta)"/>
    <line x1="-8" y1="22" x2="8" y2="-22" stroke="#ffffff" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- ====================================== -->
  <!--  "illu" — 44px gap from bottom node    -->
  <!-- ====================================== -->

  <text x="200" y="218" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace"
        font-weight="800" font-size="68" letter-spacing="6"
        fill="#00fff2" filter="url(#textNeon)">illu</text>

  <!-- Tagline -->
  <text x="200" y="245" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-weight="300" font-size="15" letter-spacing="1"
        fill="#a78bfa">Code intelligence for AI agents</text>

  <!-- Tech badges — centered, bottom at y=284 (26px from edge) -->
  <g transform="translate(200, 264)">
    <rect x="-88" y="0" width="52" height="20" rx="3" fill="none" stroke="#00fff2" stroke-width="0.7" opacity="0.4"/>
    <text x="-62" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#00fff2" opacity="0.7">Rust</text>

    <rect x="-24" y="0" width="48" height="20" rx="3" fill="none" stroke="#d946ef" stroke-width="0.7" opacity="0.4"/>
    <text x="0" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#d946ef" opacity="0.7">MCP</text>

    <rect x="36" y="0" width="52" height="20" rx="3" fill="none" stroke="#7c3aed" stroke-width="0.7" opacity="0.4"/>
    <text x="62" y="14" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.7">SQLite</text>
  </g>
</svg>
