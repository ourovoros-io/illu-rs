<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illu Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --blue: #38bdf8;
            --emerald: #10b981;
            --amber: #f59e0b;
            --slate: #475569;
            --border: rgba(71, 85, 105, 0.4);
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, var(--blue), var(--emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-badge {
            font-size: 0.75rem;
            background: #1e293b;
            color: var(--text-dim);
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-left: 0.75rem;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sys-info {
            text-align: right;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .repo-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--blue);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .repo-path {
            font-size: 0.875rem;
            color: var(--text-dim);
            font-family: ui-monospace, monospace;
            margin: 0.25rem 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            border-width: 1px;
            border-style: solid;
        }

        .status-up { background: rgba(16, 185, 129, 0.1); color: var(--emerald); border-color: rgba(16, 185, 129, 0.2); }
        .status-stale { background: rgba(245, 158, 11, 0.1); color: var(--amber); border-color: rgba(245, 158, 11, 0.2); }
        .status-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(71, 85, 105, 0.2);
        }

        .stat-label { font-size: 0.625rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.25rem; }
        .stat-val { font-size: 1.125rem; font-weight: 700; }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .info-label { color: var(--text-dim); }
        .info-val { color: #cbd5e1; font-family: ui-monospace, monospace; }

        .health-section {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            flex: 1;
        }

        .health-title { font-size: 0.625rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.75rem; letter-spacing: 0.05em; }

        .progress-container { margin-bottom: 0.75rem; }
        .progress-label { display: flex; justify-content: space-between; font-size: 0.625rem; margin-bottom: 0.25rem; }
        .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; }

        .card-footer {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            font-size: 0.625rem;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin: 1rem 0;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .refresh-btn {
            background: #1e293b;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: #334155; color: var(--text); }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 1.5rem;
            border: 2px dashed var(--border);
            grid-column: 1 / -1;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }
        .cancel-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }
        .remove-confirm-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .remove-confirm-btn:hover {
            background: #dc2626;
        }
        .remove-btn {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: rgba(239, 68, 68, 0.7);
            padding: 0.375rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }
        .remove-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loader">
            <div class="spinner"></div>
            <div style="color: var(--text-dim); font-size: 0.875rem;">Gathering intelligence...</div>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0; font-size: 1.25rem; font-weight: 800;">Remove Repository?</h3>
            <p style="color: var(--text-dim); font-size: 0.875rem; margin-top: 1rem; line-height: 1.6;">
                This will remove <span id="modal-repo-name" style="font-weight: 700; color: var(--blue);"></span> from the registry. 
                The local <code style="background: rgba(0,0,0,0.3); padding: 0.125rem 0.25rem; border-radius: 4px;">.illu/index.db</code> and index files will NOT be deleted.
            </p>
            <div class="modal-actions">
                <button id="cancel-modal-btn" class="cancel-btn">Cancel</button>
                <button id="confirm-remove-btn" class="remove-confirm-btn">Confirm Removal</button>
            </div>
        </div>
    </div>

    <script>
        let currentRepoToDelete = null;

        const escapeHtml = (unsafe) => {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        const openModal = (name, path) => {
            currentRepoToDelete = { name, path };
            document.getElementById('modal-repo-name').textContent = name;
            document.getElementById('modal').classList.add('active');
        };

        const closeModal = () => {
            document.getElementById('modal').classList.remove('active');
            currentRepoToDelete = null;
        };

        document.getElementById('cancel-modal-btn').addEventListener('click', closeModal);

        document.getElementById('confirm-remove-btn').addEventListener('click', async () => {
            if (!currentRepoToDelete) return;

            const btn = document.getElementById('confirm-remove-btn');
            btn.disabled = true;
            btn.textContent = 'Removing...';
            
            try {
                const res = await fetch('/api/repos', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentRepoToDelete.path })
                });
                
                if (res.ok) {
                    closeModal();
                    loadData();
                } else {
                    const err = await res.text();
                    alert('Failed to remove: ' + err);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirm Removal';
            }
        });

        // Close modal on background click
        document.getElementById('modal').onclick = (e) => {
            if (e.target === document.getElementById('modal')) closeModal();
        };

        const formatSize = (bytes) => {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        const formatTime = (ts) => {
            if (!ts || ts === "0") return 'Never';
            return new Date(parseInt(ts) * 1000).toLocaleString();
        };

        const renderHealth = (health) => {
            if (!health || !health.confidence_distribution || health.confidence_distribution.length === 0) {
                return '<p style="font-size: 0.75rem; color: var(--slate); font-style: italic;">No metrics available</p>';
            }

            return health.confidence_distribution.map(([label, count]) => {
                const pct = (count / health.total_refs * 100) || 0;
                const color = label === 'high' ? 'var(--emerald)' : label === 'medium' ? 'var(--amber)' : 'var(--slate)';
                return `
                    <div class="progress-container">
                        <div class="progress-label">
                            <span style="text-transform: capitalize; font-weight: 500;">${escapeHtml(label)}</span>
                            <span style="color: var(--text-dim);">${count} refs</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${pct}%; background: ${color}"></div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        const renderRepo = (repo) => {
            const statusClass = repo.error ? 'status-error' : (repo.is_stale ? 'status-stale' : 'status-up');
            const statusText = repo.error ? 'Error' : (repo.is_stale ? 'Stale' : 'Up to Date');

            return `
                <div class="card" data-path="${escapeHtml(repo.path)}" data-name="${escapeHtml(repo.name)}">
                    <div class="card-header">
                        <div style="flex: 1; min-width: 0;">
                            <h2 class="repo-name" title="${escapeHtml(repo.name)}">${escapeHtml(repo.name)}</h2>
                            <p class="repo-path" title="${escapeHtml(repo.path)}">${escapeHtml(repo.path)}</p>
                            <button class="remove-btn action-remove">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                                Remove Repository
                            </button>
                        </div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>

                    ${repo.error ? `<div class="error-msg">${escapeHtml(repo.error)}</div>` : `
                        <div class="stats-grid">
                            <div class="stat-box">
                                <div class="stat-label">Symbols</div>
                                <div class="stat-val">${repo.symbol_count.toLocaleString()}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Files</div>
                                <div class="stat-val">${repo.file_count.toLocaleString()}</div>
                            </div>
                        </div>

                        <div class="info-row">
                            <span class="info-label">Indexed Commit</span>
                            <span class="info-val">${repo.indexed_commit ? escapeHtml(repo.indexed_commit.substring(0, 8)) : 'none'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Current HEAD</span>
                            <span class="info-val">${repo.current_head ? escapeHtml(repo.current_head.substring(0, 8)) : 'none'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Last Indexed</span>
                            <span class="info-val">${formatTime(repo.last_indexed)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Index Size</span>
                            <span class="info-val">${formatSize(repo.index_size_bytes)}</span>
                        </div>

                        <div class="health-section">
                            <div class="health-title">Ref Quality</div>
                            ${renderHealth(repo.health)}
                        </div>
                    `}

                    <div class="card-footer">
                        <span>${repo.crate_count} Crates</span>
                        <span>${repo.dep_count} Deps</span>
                        ${repo.health?.truncated_signatures > 0 ? `<span style="color: var(--amber)">${repo.health.truncated_signatures} Truncated</span>` : ''}
                        <span style="margin-left: auto; opacity: 0.5; font-family: monospace; font-size: 0.5rem; text-transform: lowercase;">v${escapeHtml(repo.index_version || '0.0.0')}</span>
                    </div>
                </div>
            `;
        };

        const loadData = async () => {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                const html = `
                    <div class="container">
                        <header>
                            <div>
                                <h1>Illu Dashboard <span class="version-badge">v${escapeHtml(data.system_info.illu_version)}</span></h1>
                                <p style="color: var(--text-dim); margin-top: 0.5rem; font-weight: 500;">Monitoring ${data.repos.length} registered codebases</p>
                            </div>
                            <div class="sys-info">
                                <div>${escapeHtml(data.system_info.os)} &bull; ${escapeHtml(data.system_info.arch)}</div>
                                <div style="margin-top: 0.25rem;">Intelligence Hub Online</div>
                            </div>
                        </header>

                        <div class="grid" id="repo-grid">
                            ${data.repos.length > 0 
                                ? data.repos.map(renderRepo).join('') 
                                : '<div class="empty-state"><div style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">No repositories registered</div><div style="color: var(--text-dim); font-size: 0.875rem;">Run <code>illu serve</code> in a project directory to begin indexing.</div></div>'
                            }
                        </div>

                        <footer style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center;">
                            <div style="font-size: 0.625rem; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: 0.2em;">Illu Code Intelligence &bull; End of Data</div>
                        </footer>
                    </div>
                `;
                document.getElementById('app').innerHTML = html;

                // Attach event delegation for remove buttons
                document.getElementById('repo-grid').addEventListener('click', (e) => {
                    const removeBtn = e.target.closest('.action-remove');
                    if (removeBtn) {
                        const card = removeBtn.closest('.card');
                        const name = card.dataset.name;
                        const path = card.dataset.path;
                        openModal(name, path);
                    }
                });

            } catch (err) {
                document.getElementById('app').innerHTML = `
                    <div class="loader" style="color: #ef4444; text-align: center; padding: 2rem;">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">&otimes;</div>
                        <div style="font-size: 1.25rem; font-weight: 700;">Dashboard offline</div>
                        <div style="color: var(--text-dim); font-size: 0.875rem; margin-top: 0.5rem;">${escapeHtml(err.message)}</div>
                        <button onclick="location.reload()" class="refresh-btn" style="margin-top: 1.5rem; padding: 0.5rem 1.5rem;">Try Again</button>
                    </div>
                `;
            }
        };

        loadData();
    </script>
</body>
</html>
